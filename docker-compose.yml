services:
  postgres:
    image: postgres:16-alpine
    container_name: catcheat-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: catcheat_dev
      POSTGRES_USER: catcheat
      POSTGRES_PASSWORD: catcheat
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: catcheat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: