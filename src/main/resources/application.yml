spring:
  application:
    name: backend_catcheat

  profiles:
    active: dev

  jpa:
    open-in-view: false

  flyway:
    enabled: true

  # DB(datasource)는 application-dev.yml / application-prod.yml에서 프로파일별로 정의한다.

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: [profile, email]
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
            client-name: Kakao
            scope: [profile_nickname, profile_image, account_email]
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Naver
            scope: [name, email, profile_image]
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

# JWT 설정 — 만료 시간은 임시값(팀 확정 시 갱신). access 30분 / refresh 14일
jwt:
  secret: ${JWT_SECRET}
  access-token-expire-ms: ${JWT_ACCESS_EXPIRE_MS:1800000}
  refresh-token-expire-ms: ${JWT_REFRESH_EXPIRE_MS:1209600000}

# 로그인 성공 후 프론트로 리다이렉트할 기준 주소 (토큰 전달용)
app:
  oauth2:
    authorized-redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth/callback}
